<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Health Monitoring</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS for the interactive map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
        }
        .glow-blue {
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.4), 0 0 20px rgba(59, 130, 246, 0.3);
        }
        .loader {
            border: 4px solid #374151;
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #map {
            height: 300px;
        }
    </style>
</head>
<body class="text-gray-200">
    <!-- KrishiSetu Header -->
<nav class="bg-gray-900 text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      
      <!-- Logo and Brand -->
      <div class="flex items-center space-x-2">
        <img src="{{ url_for('static', filename='A1.jpeg') }}" alt="KrishiSetu Logo" class="h-8 w-8">
        <!-- <img src="A1.png" alt="KrishiSetu Logo" class="h-8 w-8"> -->
        <span class="font-bold text-lg">Krishi<span class="text-green-400">Setu</span></span>
      </div>
      
      <!-- Navigation Links -->
      <!-- <div class="hidden md:flex space-x-6">
        <a href="#" class="text-gray-300 hover:text-white transition">Home</a>
        <a href="#" class="text-gray-300 hover:text-white transition">About</a>
        <a href="#" class="text-gray-300 hover:text-white transition">Services</a>
        <a href="#" class="text-gray-300 hover:text-white transition">Contact</a>
      </div> -->
    </div>
  </div>
</nav>


    <div class="container mx-auto p-4 max-w-2xl">
        <header class="text-center my-8">
            <div class="inline-block bg-green-900/50 border border-green-500/30 p-3 rounded-full">
                 <svg class="w-12 h-12 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <h1 class="text-4xl font-bold text-white mt-4">Crop Health Monitoring</h1>
            <p class="text-lg text-gray-400 mt-1">Your weekly farm performance dashboard.</p>
        </header>

        <!-- MANUAL ENTRY SECTION -->
        <div class="bg-gray-900 p-6 rounded-xl shadow-2xl mb-6 border border-gray-700">
            <h2 class="text-xl font-semibold mb-4 text-gray-300">Enter Farm Location</h2>
            <div class="space-y-4">
                <div>
                    <label for="latitude" class="block text-sm font-medium text-gray-400">Latitude</label>
                    <input type="text" id="latitude" name="latitude" class="mt-1 block w-full bg-gray-800 border-gray-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., 16.20">
                </div>
                <div>
                    <label for="longitude" class="block text-sm font-medium text-gray-400">Longitude</label>
                    <input type="text" id="longitude" name="longitude" class="mt-1 block w-full bg-gray-800 border-gray-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., 77.35">
                </div>
                <button id="submitBtn" class="w-full flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 shadow-lg glow-blue">
                    Analyze and Send SMS Report
                </button>
            </div>
        </div>

        <!-- MAP VIEW SECTION -->
        <div id="map" class="bg-gray-900 rounded-xl shadow-lg mb-6 border border-gray-700"></div>


        <!-- STATUS/REPORT SECTION -->
        <div id="report" class="bg-gray-900 rounded-xl shadow-2xl border border-gray-700 overflow-hidden hidden">
            <div class="p-6">
                <h2 class="text-2xl font-bold mb-4 text-gray-300 border-b border-gray-700 pb-3">Analysis Result</h2>
                <div id="report-content" class="text-gray-400 space-y-4">
                    <!-- Dynamic content will be injected here -->
                </div>
            </div>
        </div>
        
        <footer class="text-center text-gray-600 mt-8 text-sm">
            <p>&copy; 2025 Project KrishiSetu</p>
        </footer>
    </div>

    <!-- Leaflet JS for the interactive map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const submitBtn = document.getElementById('submitBtn');
            const latInput = document.getElementById('latitude');
            const lonInput = document.getElementById('longitude');
            const reportDiv = document.getElementById('report');
            const reportContent = document.getElementById('report-content');

            // Initialize the map
            const map = L.map('map').setView([16.20, 77.35], 8); // Default view over Raichur
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);
            let marker;

            submitBtn.addEventListener('click', () => {
                const lat = latInput.value;
                const lon = lonInput.value;

                if (!lat || !lon) {
                    alert('Please enter both latitude and longitude.');
                    return;
                }

                // Update map view
                const newLatLng = [parseFloat(lat), parseFloat(lon)];
                map.setView(newLatLng, 13); // Zoom in on the location
                if (marker) {
                    marker.setLatLng(newLatLng);
                } else {
                    marker = L.marker(newLatLng).addTo(map);
                }
                marker.bindPopup(`Analyzing: ${lat}, ${lon}`).openPopup();


                // Show loading state
                reportDiv.classList.remove('hidden');
                reportContent.innerHTML = '<div class="flex justify-center items-center"><div class="loader"></div><p class="ml-4">Analyzing... This may take a moment.</p></div>';
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<div class="loader"></div>';

                // Call the backend API
                fetch('/trigger-analysis', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ lat: lat, lon: lon }),
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        const formattedReport = data.report.replace(/\\n/g, '<br>');
                        reportContent.innerHTML = `<p class="whitespace-pre-wrap">${formattedReport}</p><p class="mt-4 text-green-400 font-semibold">SMS alert has been sent successfully!</p>`;
                    } else {
                        reportContent.innerHTML = `<p class="text-red-400">Error: ${data.message}</p>`;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    reportContent.innerHTML = '<p class="text-red-400">A network error occurred. Please check the console and ensure the backend server is running.</p>';
                })
                .finally(() => {
                    // Restore button state
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Analyze and Send SMS Report';
                });
            });
        });
    </script>

</body>
</html>
